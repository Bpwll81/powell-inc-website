<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Resort | Powell Global LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --forest: #1B261D; 
            --bg: #F9F7F2; 
            --text: #334155; 
        }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.8; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; background: rgba(249, 247, 242, 0.95); backdrop-filter: blur(10px); z-index: 1000; }
        .logo-text { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--forest); border: 2px solid var(--forest); padding: 5px 10px; text-decoration: none; font-size: 1rem; }

        .hero { position: relative; height: 65vh; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; overflow: hidden; background: #000; }
        .hero-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; opacity: 0; animation: fadeCycle 15s infinite; }
        .hero-slide::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(27, 38, 29, 0.4), rgba(27, 38, 29, 0.8)); }
        
        .slide-1 { background-image: url('https://images.unsplash.com/photo-1580748141549-71748dbe0bdc?q=80&w=2000'); animation-delay: 0s; }
        .slide-2 { background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000'); animation-delay: 5s; }
        .slide-3 { background-image: url('https://images.unsplash.com/photo-1552667466-07770ae110d0?q=80&w=2000'); animation-delay: 10s; }
        
        @keyframes fadeCycle { 0%, 25% { opacity: 1; } 33%, 100% { opacity: 0; } }
        .hero-content { position: relative; z-index: 2; padding: 20px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: 8px; margin: 0; font-weight: 900; }

        .section-title { font-size: clamp(1.8rem, 5vw, 2.5rem); color: var(--forest); margin-bottom: 40px; text-transform: uppercase; border-left: 6px solid var(--gold); padding-left: 20px; font-weight: 800; }
        
        .feature-list { list-style: none; padding: 0; }
        .feature-list li { margin-bottom: 25px; padding-left: 35px; position: relative; font-size: 1.1rem; color: #4b5563; }
        .feature-list li::before { content: '◈'; position: absolute; left: 0; color: var(--gold); font-size: 1.2rem; }

        .mercantile-wrap { background: var(--forest); color: #fff; padding: 100px 20px; margin: 60px 0; border-top: 4px solid var(--gold); }
        .m-visual { width: 100%; height: 500px; background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=2000'); background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); margin: 40px 0 10px 0; filter: sepia(15%) contrast(105%); }
        
        .vplex-notice { background: rgba(0,0,0,0.2); color: var(--gold); padding: 25px; font-family: ui-monospace, monospace; text-align: center; border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 60px; letter-spacing: 2px; font-weight: bold; font-size: 0.9rem; }
        
        .rink-box { background: white; border-top: 4px solid #3b82f6; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); height: 100%; }
        .ring-card { background: white; padding: 45px; border-left: 5px solid var(--forest); height: 100%; border: 1px solid rgba(0,0,0,0.05); border-left-width: 5px; }
    </style>
</head>
<body>
